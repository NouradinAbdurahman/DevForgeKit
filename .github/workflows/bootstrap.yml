name: DevForgeKit Bootstrap

# An unrestricted push+pull_request trigger runs this identical macOS
# dry-run job twice for the same commit (a feature-branch push, then
# its PR firing separately) - restricting push to main mirrors e2e.yml/
# shellcheck.yml/registry-smoke.yml's fix for the same duplication.
on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  dry-run:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v7

      - name: Run bootstrap.sh in dry-run mode
        run: |
          chmod +x bootstrap.sh
          ./bootstrap.sh --yes --dry-run

      - name: Upload generated report
        uses: actions/upload-artifact@v7
        with:
          name: system-report
          path: reports/system-report.txt
